<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Harmony | A Wish for Peace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #e3f2fd;
            --accent-blue: #90caf9;
            --text-main: #455a64;
            --text-light: #78909c;
            --white: #ffffff;
            --soft-green: #e8f5e9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 600px;
            width: 90%;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-container {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        h1 {
            font-weight: 600;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            color: #546e7a;
            letter-spacing: -0.5px;
        }

        p {
            font-weight: 300;
            line-height: 1.6;
            color: var(--text-light);
            margin-bottom: 2rem;
        }

        .quote-display {
            min-height: 80px;
            font-style: italic;
            color: #7986cb;
            margin-bottom: 2rem;
            padding: 0 1rem;
            transition: all 0.5s ease;
        }

        .btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(144, 202, 249, 0.4);
        }

        .btn:hover {
            background-color: #64b5f6;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(144, 202, 249, 0.6);
        }

        .btn:active {
            transform: scale(0.98);
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: var(--text-light);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Decoration elements */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            z-index: -1;
        }
    </style>
</head>
<body>

    <!-- Background Decoration -->
    <div class="circle" style="width: 300px; height: 300px; top: -100px; left: -100px;"></div>
    <div class="circle" style="width: 200px; height: 200px; bottom: -50px; right: -50px;"></div>

    <div class="container">
        <div class="icon-container">🕊️</div>
        <h1>May Peace Prevail</h1>
        <p>In a world of many colors and voices, let our common language be kindness. Together, we can build a future where every heart finds its home in harmony.</p>
        
        <div class="quote-display" id="quote-box">
            "Peace begins with a smile."
        </div>

        <button class="btn" onclick="newWish()">Make a Peace Wish</button>
    </div>

    <footer>Bound by Humanity • United by Hope</footer>

    <script>
        const quotes = [
            "\"Peace begins with a smile.\" — Mother Teresa",
            "\"Imagine all the people living life in peace.\" — John Lennon",
            "\"When the power of love overcomes the love of power, the world will know peace.\" — Jimi Hendrix",
            "\"An eye for an eye only ends up making the whole world blind.\" — Mahatma Gandhi",
            "\"Peace is not merely a distant goal that we seek, but a means by which we arrive at that goal.\" — Martin Luther King Jr.",
            "\"World peace begins with inner peace.\" — Dalai Lama",
            "\"Darkness cannot drive out darkness; only light can do that.\" — Martin Luther King Jr.",
            "\"May every heart be a garden of peace.\""
        ];

        function newWish() {
            const quoteBox = document.getElementById('quote-box');
            
            // Simple fade out effect
            quoteBox.style.opacity = 0;
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * quotes.length);
                quoteBox.innerText = quotes[randomIndex];
                quoteBox.style.opacity = 1;
            }, 500);

            // Add a little celebration effect
            createHeart();
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '🤍';
            heart.style.position = 'fixed';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.bottom = '0';
            heart.style.fontSize = '2rem';
            heart.style.opacity = '0.7';
            heart.style.transition = 'transform 3s linear, opacity 3s';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.style.transform = `translateY(-100vh) rotate(${Math.random() * 360}deg)`;
                heart.style.opacity = '0';
            }, 100);

            setTimeout(() => {
                heart.remove();
            }, 3000);
        }
    </script>
</body>
</html>
